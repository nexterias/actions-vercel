name: CI

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - dist/*
  push:
    branches: [main]
    paths-ignore:
      - dist/*
    tags:
      - v*.*.*

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Pre-build devShell
        run: nix build --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default

      - shell: "nix develop -c bash -e {0}"
        run: pnpm i --frozen-lock

      - shell: "nix develop -c bash -e {0}"
        run: pnpm type-check

      - shell: "nix develop -c bash -e {0}"
        run: pnpm biome ci .

      - shell: "nix develop -c bash -e {0}"
        run: pnpm build

      - uses: actions/upload-artifact@v7
        with:
          name: actions-vercel-dist
          path: ./dist

      - name: Commit dist files
        shell: "nix develop -c bash -e {0}"
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ./dist
          git commit -m "build: update \`dist\` files" || true
          git push

  deploy:
    needs: [build]
    name: Deploy
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      deployments: write
      statuses: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Pre-build devShell
        run: nix build --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default

      - uses: actions/download-artifact@v8
        with:
          name: actions-vercel-dist
          path: ./dist

      - uses: ./
        id: vercel
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          prebuilt: true
          production: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest' }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}

      - run: |
          echo ${{ steps.vercel.outputs.deployment-url }}
          echo ${{ steps.vercel.outputs.deployment-status }}

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/') && github.actor != 'github-actions'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Pre-build devShell
        run: nix build --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default

      - name: Setup git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - uses: actions/github-script@v9
        id: git-cliff
        with:
          result-encoding: string
          script: |
            const { stdout } = await exec.getExecOutput('git', ['cliff', '-l', '--strip', 'header'])
            return stdout

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          body: ${{ steps.git-cliff.outputs.result }}

  tag:
    needs: [build]
    name: Tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.actor != 'github-actions'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get target tag
        id: tag
        run: echo "name=$(echo '${{ github.ref }}' | sed -r 's/refs\/tags\/(v[0-9]+)\..*/\1/')" >> $GITHUB_OUTPUT

      - name: Update & Push tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -f ${{ steps.tag.outputs.name }} ${{ github.ref }}
          git push -f --tags origin ${{ steps.tag.outputs.name }}
